name: Update Plugins

on:
  push:
    paths:
      - "package.json"
      - "bun.lock"
      - "pkgs/generate-options.nix"
      - "docs/site.nix"
  schedule:
    - cron: "0 */8 * * *" # Every 8 hours
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  NIXPKGS_EXPR: >-
    let flake = builtins.getFlake (toString ./.);
        pkgs = import flake.inputs.nixpkgs-nixcord {
          system = builtins.currentSystem;
          config.allowUnfree = true;
        };
    in

jobs:
  update-plugins:
    name: Update and verify plugins
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.ref_name }}

      - uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Equicord and Vencord
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          for spec in "equicord.nix:equicord-update" "vencord.nix:vencord-update"; do
            package_file=${spec%%:*}
            update_bin=${spec#*:}
            update_script=$(nix build --no-link --print-out-paths --impure --expr \
              "$NIXPKGS_EXPR (pkgs.callPackage ./pkgs/$package_file {}).passthru.updateScript")
            "$update_script/bin/$update_bin"
          done

      - name: Refresh Linux dependencies and generate plugin options
        env:
          NIXCORD_GENERATE_WITH_GIT: "1"
        run: |
          set -euo pipefail
          nix_file=pkgs/generate-options.nix
          for attempt in {1..3}; do
            if output=$(nix run .#generate 2>&1); then
              break
            fi
            new_hash=$(grep -oE 'got:[[:space:]]+sha256-[A-Za-z0-9+/=]+' <<< "$output" \
              | tail -1 | sed -E 's/got:[[:space:]]*//' || true)
            if [[ -z "$new_hash" || "$attempt" -eq 3 ]]; then
              printf '%s\n' "$output"
              exit 1
            fi
            sed -i -E \
              "s|nodeModulesHashLinux = \"[^\"]+\";|nodeModulesHashLinux = \"$new_hash\";|" \
              "$nix_file"
          done

          docs_file=docs/site.nix
          system=$(nix eval --impure --raw --expr builtins.currentSystem)
          for attempt in {1..3}; do
            if output=$(nix build --no-link .#docs 2>&1); then
              break
            fi
            new_hash=$(grep -oE 'got:[[:space:]]+sha256-[A-Za-z0-9+/=]+' <<< "$output" \
              | tail -1 | sed -E 's/got:[[:space:]]*//' || true)
            if [[ -z "$new_hash" || "$attempt" -eq 3 ]]; then
              printf '%s\n' "$output"
              exit 1
            fi
            SYSTEM="$system" NEW_HASH="$new_hash" perl -pi -e \
              's|^(\s*)\Q$ENV{SYSTEM}\E = "[^"]+";|$1$ENV{SYSTEM} = "$ENV{NEW_HASH}";|' \
              "$docs_file"
          done

      - name: Build packages and run checks
        run: |
          set -euo pipefail
          nix build --no-link --print-build-logs .#equicord .#vencord
          nix flake check --print-build-logs

      - name: Export pnpm dependency stores
        run: |
          set -euo pipefail
          paths=()
          for package in equicord vencord; do
            paths+=("$(nix build --no-link --print-out-paths --impure --expr \
              "$NIXPKGS_EXPR (pkgs.callPackage ./pkgs/$package.nix {}).pnpmDeps")")
          done
          nix-store --export "${paths[@]}" > pnpm-deps.nar

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: pnpm-deps
          path: pnpm-deps.nar
          compression-level: 0
          retention-days: 1

      - name: Commit and push changes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          paths=(
            pkgs/equicord.nix
            pkgs/vencord.nix
            pkgs/generate-options.nix
            docs/site.nix
            package.json
            bun.lock
            modules/plugins
          )
          if [[ -z "$(git status --porcelain -- "${paths[@]}")" ]]; then
            echo "::notice::Plugin sources and generated options are already current"
            exit 0
          fi

          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git config pull.rebase true
          git config rebase.autoStash true

          equicord_version=$(nix eval --raw .#equicord.version)
          vencord_version=$(nix eval --raw .#vencord.version)
          git add -- "${paths[@]}"
          git commit -m "plugins: update upstream snapshots" -m \
            "Equicord: $equicord_version
          Vencord: $vencord_version"

          for attempt in {1..5}; do
            git rebase --abort 2>/dev/null || true
            if git fetch origin \
              && git pull --rebase origin "${{ github.ref_name }}" \
              && git push origin "HEAD:${{ github.ref_name }}"; then
              exit 0
            fi
            if [[ "$attempt" -eq 5 ]]; then
              echo "::error::Failed to push after 5 attempts"
              exit 1
            fi
            sleep $((attempt * 2))
          done

  verify-darwin:
    name: Verify plugins on Darwin
    needs: update-plugins
    runs-on: macos-latest
    timeout-minutes: 45
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.ref_name }}

      - uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: pnpm-deps
          path: .

      - name: Import pnpm dependency stores
        run: nix-store --import < pnpm-deps.nar

      - name: Refresh Darwin dependencies
        env:
          NIXCORD_GENERATE_WITH_GIT: "1"
        run: |
          set -euo pipefail
          git pull --rebase origin "${{ github.ref_name }}"
          nix_file=pkgs/generate-options.nix
          for attempt in {1..3}; do
            if output=$(nix run .#generate 2>&1); then
              break
            fi
            new_hash=$(grep -oE 'got:[[:space:]]+sha256-[A-Za-z0-9+/=]+' <<< "$output" \
              | tail -1 | sed -E 's/got:[[:space:]]*//' || true)
            if [[ -z "$new_hash" || "$attempt" -eq 3 ]]; then
              printf '%s\n' "$output"
              exit 1
            fi
            NEW_HASH="$new_hash" perl -pi -e \
              's|nodeModulesHashDarwin = "[^"]+";|nodeModulesHashDarwin = "$ENV{NEW_HASH}";|' \
              "$nix_file"
          done
          if ! git diff --quiet -- modules/plugins; then
            echo "::error::Darwin generated different plugin metadata than Linux"
            git diff --stat -- modules/plugins
            exit 1
          fi

          system=$(nix eval --impure --raw --expr builtins.currentSystem)
          if nix eval --raw ".#packages.$system.docs.drvPath" >/dev/null 2>&1; then
            docs_file=docs/site.nix
            for attempt in {1..3}; do
              if output=$(nix build --no-link .#docs 2>&1); then
                break
              fi
              new_hash=$(grep -oE 'got:[[:space:]]+sha256-[A-Za-z0-9+/=]+' <<< "$output" \
                | tail -1 | sed -E 's/got:[[:space:]]*//' || true)
              if [[ -z "$new_hash" || "$attempt" -eq 3 ]]; then
                printf '%s\n' "$output"
                exit 1
              fi
              SYSTEM="$system" NEW_HASH="$new_hash" perl -pi -e \
                's|^(\s*)\Q$ENV{SYSTEM}\E = "[^"]+";|$1$ENV{SYSTEM} = "$ENV{NEW_HASH}";|' \
                "$docs_file"
            done
          fi

      - name: Build packages and run checks
        run: |
          set -euo pipefail
          system=$(nix eval --impure --raw --expr builtins.currentSystem)
          packages=(.#equicord .#vencord)
          if nix eval --raw ".#packages.$system.docs.drvPath" >/dev/null 2>&1; then
            packages+=(.#docs)
          fi
          nix build --max-jobs 1 --cores 2 --no-link --print-build-logs "${packages[@]}"
          nix flake check --max-jobs 1 --cores 2 --print-build-logs

      - name: Commit Darwin dependency hash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          paths=(pkgs/generate-options.nix docs/site.nix)
          if git diff --quiet -- "${paths[@]}"; then
            echo "::notice::Darwin dependency hashes are already current"
            exit 0
          fi

          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git config pull.rebase true
          git config rebase.autoStash true
          git add -- "${paths[@]}"
          git commit -m "plugins: update Darwin dependencies"

          for attempt in {1..5}; do
            git rebase --abort 2>/dev/null || true
            if git fetch origin \
              && git pull --rebase origin "${{ github.ref_name }}" \
              && git push origin "HEAD:${{ github.ref_name }}"; then
              exit 0
            fi
            if [[ "$attempt" -eq 5 ]]; then
              echo "::error::Failed to push after 5 attempts"
              exit 1
            fi
            sleep $((attempt * 2))
          done
