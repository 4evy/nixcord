name: Project Checks

on:
  merge_group:
  pull_request:
  push:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  repository-quality:
    name: Repository quality
    if: >-
      github.event_name != 'pull_request' ||
      github.event.pull_request.author_association == 'OWNER' ||
      github.event.pull_request.author_association == 'MEMBER' ||
      github.event.pull_request.author_association == 'COLLABORATOR'
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: ./.github/actions/install-nix

      - uses: ./.github/actions/setup-bun

      - name: Lint and security-audit GitHub Actions
        run: >-
          nix shell nixpkgs#yamllint nixpkgs#actionlint nixpkgs#zizmor
          --command bash -c 'yamllint . && actionlint && zizmor --pedantic .'

      - name: Validate Renovate configuration
        run: >-
          node node_modules/renovate/dist/config-validator.js
          --strict --no-global .github/renovate.json

      - name: Check TypeScript, docs, dead code, duplication, and formatting
        run: bun run check

      - name: Run JavaScript and TypeScript tests
        run: bun run test

      - name: Check Nix formatting
        run: |
          nix_files=()
          while IFS= read -r file; do
            [[ ! -f "$file" ]] || nix_files+=("$file")
          done < <(git ls-files '*.nix')
          nix shell nixpkgs#nixfmt --command nixfmt --check "${nix_files[@]}"

  prepare-pnpm-deps:
    name: Prepare pnpm dependencies
    if: >-
      github.event_name != 'pull_request' ||
      github.event.pull_request.author_association == 'OWNER' ||
      github.event.pull_request.author_association == 'MEMBER' ||
      github.event.pull_request.author_association == 'COLLABORATOR'
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          persist-credentials: false

      - uses: ./.github/actions/install-nix

      - name: Export pnpm dependency stores
        env:
          NIXPKGS_EXPR: >-
            let flake = builtins.getFlake (toString ./.);
                pkgs = import flake.inputs.nixpkgs-nixcord {
                  system = builtins.currentSystem;
                  config.allowUnfree = true;
                };
            in
        run: |
          set -euo pipefail
          paths=()
          for package in equicord vencord; do
            paths+=("$(nix build --no-link --print-out-paths --impure --expr \
              "$NIXPKGS_EXPR (pkgs.callPackage ./pkgs/$package.nix {}).pnpmDeps")")
          done
          nix-store --export "${paths[@]}" > pnpm-deps.nar

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: pnpm-deps
          path: pnpm-deps.nar
          compression-level: 0
          retention-days: 1

  nix:
    name: Nix
    needs: prepare-pnpm-deps
    if: >-
      github.event_name != 'pull_request' ||
      github.event.pull_request.author_association == 'OWNER' ||
      github.event.pull_request.author_association == 'MEMBER' ||
      github.event.pull_request.author_association == 'COLLABORATOR'
    permissions:
      contents: read
    uses: ./.github/workflows/nix-check.yaml
