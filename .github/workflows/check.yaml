name: Flake Checks

on:
  pull_request:
  push:
  workflow_dispatch:

jobs:
  lint-yaml:
    name: Lint YAML
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22

      - name: Lint every YAML file
        run: nix shell nixpkgs#yamllint --command yamllint .

      - name: Check workflow semantics
        run: nix shell nixpkgs#actionlint --command actionlint

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          # renovate: datasource=node-version depName=node
          node-version: "24.18.0"

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          # renovate: datasource=npm depName=bun
          bun-version: "1.3.14"

      - name: Validate Renovate configuration
        run: |
          bun install --frozen-lockfile
          node node_modules/renovate/dist/config-validator.js \
            --strict --no-global .github/renovate.json

  prepare-pnpm-deps:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1

      - uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22

      - name: Export pnpm dependency stores
        env:
          NIXPKGS_EXPR: >-
            let flake = builtins.getFlake (toString ./.);
                pkgs = import flake.inputs.nixpkgs-nixcord {
                  system = builtins.currentSystem;
                  config.allowUnfree = true;
                };
            in
        run: |
          set -euo pipefail
          paths=()
          for package in equicord vencord; do
            paths+=("$(nix build --no-link --print-out-paths --impure --expr \
              "$NIXPKGS_EXPR (pkgs.callPackage ./pkgs/$package.nix {}).pnpmDeps")")
          done
          nix-store --export "${paths[@]}" > pnpm-deps.nar

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: pnpm-deps
          path: pnpm-deps.nar
          compression-level: 0
          retention-days: 1

  check:
    needs: prepare-pnpm-deps
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1

      - uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: pnpm-deps
          path: .

      - name: Import pnpm dependency stores
        run: nix-store --import < pnpm-deps.nar

      - name: Run flake checks
        run: |
          nix_args=()
          if [[ "$RUNNER_OS" == "macOS" ]]; then
            nix_args+=(--max-jobs 1 --cores 2)
          fi
          nix flake check "${nix_args[@]}" --print-build-logs

      - name: Build packages
        run: |
          set -euo pipefail
          system=$(nix eval --impure --raw --expr builtins.currentSystem)
          available=$(nix eval --json ".#packages.$system" --apply builtins.attrNames)
          packages=(equicord vencord docs-json)
          for package in docs discord discord-ptb discord-canary discord-development; do
            if jq -e --arg package "$package" 'index($package) != null' <<< "$available" >/dev/null; then
              packages+=("$package")
            fi
          done
          installables=()
          for package in "${packages[@]}"; do
            installables+=(".#$package")
          done
          nix_args=()
          if [[ "$RUNNER_OS" == "macOS" ]]; then
            nix_args+=(--max-jobs 1 --cores 2)
          fi
          nix build "${nix_args[@]}" --no-link --print-build-logs "${installables[@]}"

      - name: Build generator and run TypeScript tests
        if: runner.os == 'Linux'
        run: nix build --no-link --print-build-logs .#generate
