name: Update Discord

on:
  schedule:
    - cron: "0 */8 * * *" # Every 8 hours
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  NIXPKGS_EXPR: >-
    let flake = builtins.getFlake (toString ./.);
        pkgs = import flake.inputs.nixpkgs-nixcord {
          system = builtins.currentSystem;
          config.allowUnfree = true;
        };
    in

jobs:
  update-discord:
    name: Update and verify Discord
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6.0.1
        with:
          ref: ${{ github.ref_name }}

      - uses: DeterminateSystems/nix-installer-action@v21
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update sources
        run: |
          set -euo pipefail
          test -f pkgs/discord/data/sources.json
          cp pkgs/discord/data/sources.json "$RUNNER_TEMP/discord-sources-before.json"

          update_script=$(nix build --no-link --print-out-paths --impure --expr \
            "$NIXPKGS_EXPR (pkgs.callPackage ./pkgs/discord {}).passthru.updateScript")
          "$update_script/bin/discord-update"

      - name: Validate sources
        run: |
          set -euo pipefail
          jq -e '
            def validSource:
              .kind == "distro"
              and (.version | type == "string" and length > 0)
              and (.distro.url | type == "string" and startswith("https://"))
              and (.distro.hash | type == "string" and startswith("sha256-"))
              and (.modules | type == "object" and length > 0)
              and all(.modules[];
                (.version | type == "number")
                and (.url | type == "string" and startswith("https://"))
                and (.hash | type == "string" and startswith("sha256-"))
              );
            ([keys[] | select(test("^(linux|osx)-(stable|ptb|canary|development)$"))] | length) == 8
            and all(.[]; validSource)
          ' pkgs/discord/data/sources.json

      - name: Build all Discord channels
        run: |
          set -euo pipefail
          nix build --no-link --print-build-logs \
            .#discord \
            .#discord-ptb \
            .#discord-canary \
            .#discord-development

      - name: Commit and push changes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if git diff --quiet -- pkgs/discord/data/sources.json; then
            echo "::notice::Discord sources are already current"
            exit 0
          fi

          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git config pull.rebase true
          git config rebase.autoStash true

          changes=$(jq -r --slurpfile old "$RUNNER_TEMP/discord-sources-before.json" '
            to_entries[]
            | select(.value.version != $old[0][.key].version)
            | "  \(.key): \($old[0][.key].version) -> \(.value.version)"
          ' pkgs/discord/data/sources.json)
          message="discord: update sources"
          if [[ -n "$changes" ]]; then
            message+=$'\n\n'"$changes"
          fi

          git add pkgs/discord/data/sources.json
          git commit -m "$message"

          for attempt in {1..5}; do
            git rebase --abort 2>/dev/null || true
            if git fetch origin \
              && git pull --rebase origin "${{ github.ref_name }}" \
              && git push origin "HEAD:${{ github.ref_name }}"; then
              exit 0
            fi
            if [[ "$attempt" -eq 5 ]]; then
              echo "::error::Failed to push after 5 attempts"
              exit 1
            fi
            sleep $((attempt * 2))
          done
