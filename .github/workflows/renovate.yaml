name: Renovate

on:
  schedule:
    - cron: "37 */6 * * *"
  push:
    branches:
      - main
    paths:
      - ".github/renovate.json"
      - ".github/workflows/renovate.yaml"
      - "package.json"
      - "bun.lock"
  workflow_dispatch:

concurrency:
  group: renovate
  cancel-in-progress: false

permissions: {}

jobs:
  renovate:
    name: Update dependencies directly
    runs-on: ubuntu-latest
    permissions:
      contents: write # Push dependency update commits.
      pull-requests: read # Detect existing Renovate pull requests.
      statuses: write # Report Renovate commit status.
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup-bun

      # Branch automerge pushes successful updates straight to main without PRs.
      # Repeated passes let the single-branch queue drain during one workflow run.
      - name: Run Renovate
        run: |
          for pass in 1 2 3 4 5 6; do
            echo "Renovate pass ${pass}"
            node node_modules/renovate/dist/renovate.js
          done
        env:
          LOG_LEVEL: info
          RENOVATE_TOKEN: ${{ secrets.RENOVATE_TOKEN }}
          RENOVATE_GIT_AUTHOR: "4evy <git@evy.pink>"
          RENOVATE_GIT_PRIVATE_KEY: ${{ secrets.RENOVATE_GIT_PRIVATE_KEY }}
          RENOVATE_ONBOARDING: "false"
          RENOVATE_REPOSITORIES: '["${{ github.repository }}"]'
